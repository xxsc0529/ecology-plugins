name: Publish OceanBase Haystack to PyPI

on:
  push:
    tags:
      - 'release_oceanbase_haystack_*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g., 0.1.0). Leave empty to use version from src/oceanbase_haystack/__about__.py'
        required: false
        type: string
      publish_to_test_pypi:
        description: 'Publish to Test PyPI instead of PyPI'
        required: false
        type: boolean
        default: false
      update_version:
        description: 'Update version in __about__.py before publishing'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish_version: ${{ steps.verify_version.outputs.version }}
      publish_to_test_pypi: ${{ steps.meta.outputs.publish_to_test_pypi }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set publish metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish_to_test_pypi=${{ inputs.publish_to_test_pypi }}" >> $GITHUB_OUTPUT
          else
            echo "publish_to_test_pypi=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check current version
        working-directory: oceanbase-haystack
        id: current_version
        run: |
          CURRENT_VERSION=$(grep '^__version__' src/oceanbase_haystack/__about__.py | sed 's/__version__ = "\(.*\)"/\1/')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version in __about__.py: $CURRENT_VERSION"

      - name: Update version in __about__.py
        if: github.event_name == 'workflow_dispatch' && inputs.update_version == true && inputs.version != ''
        working-directory: oceanbase-haystack
        run: |
          sed -i "s/^__version__ = \".*\"/__version__ = \"${{ inputs.version }}\"/" src/oceanbase_haystack/__about__.py
          echo "✅ Updated version to ${{ inputs.version }}"
          grep '^__version__' src/oceanbase_haystack/__about__.py

      - name: Verify version
        working-directory: oceanbase-haystack
        id: verify_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.version }}" != "" ] && [ "${{ inputs.update_version }}" = "true" ]; then
            PUBLISH_VERSION="${{ inputs.version }}"
          else
            PUBLISH_VERSION="${{ steps.current_version.outputs.version }}"
          fi
          echo "Publishing version: $PUBLISH_VERSION"
          echo "version=$PUBLISH_VERSION" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Run tests (mocked; no live OceanBase)
        working-directory: oceanbase-haystack
        run: |
          pip install -e ".[dev]"
          python -m pytest tests -v -m "not oceanbase"

      - name: Build package
        working-directory: oceanbase-haystack
        run: python -m build

      - name: Check package
        working-directory: oceanbase-haystack
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: pypi-distributions
          path: oceanbase-haystack/dist/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-distributions
          path: dist/

      - name: Publish to Test PyPI
        if: needs.build.outputs.publish_to_test_pypi == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Publish to PyPI
        if: needs.build.outputs.publish_to_test_pypi != 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*

      - name: Display published package info
        run: |
          echo "✅ Package published successfully!"
          if [ "${{ needs.build.outputs.publish_to_test_pypi }}" == "true" ]; then
            echo "📍 Published to: Test PyPI (https://test.pypi.org/project/oceanbase-haystack/)"
          else
            echo "📍 Published to: PyPI (https://pypi.org/project/oceanbase-haystack/)"
          fi
          echo "📦 Version: ${{ needs.build.outputs.publish_version }}"
