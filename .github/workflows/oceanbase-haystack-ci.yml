# Extended CI for oceanbase-haystack: multi-Python matrix and optional OceanBase CE smoke tests.
# Migrated from oceanbase-haystack; runs with working-directory oceanbase-haystack.

name: OceanBase Haystack CI

on:
  push:
    branches:
      - main
    paths:
      - 'oceanbase-haystack/**'
      - '.github/workflows/oceanbase-haystack-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'oceanbase-haystack/**'
      - '.github/workflows/oceanbase-haystack-ci.yml'

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oceanbase-haystack
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: oceanbase-haystack/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          python -m ruff check src tests
          python -m ruff format --check src tests

      - name: Run tests (mocked; no OceanBase)
        run: |
          python -m pytest tests -v -m "not oceanbase"

      - name: Build wheel and sdist
        run: python -m build

  oceanbase-smoke:
    name: OceanBase Haystack — OceanBase CE smoke (live)
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: oceanbase-haystack

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: oceanbase-haystack/pyproject.toml

      - name: Install project + dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build
          python -m build
          python -m pip install dist/oceanbase_haystack-*.whl --force-reinstall

      - name: Free disk space
        uses: kfir4444/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Start OceanBase CE
        uses: oceanbase/setup-oceanbase-ce@v1
        with:
          image_name: oceanbase/oceanbase-ce
          image_tag: '4.4.1.0-100000032025101610'
          container_name: observer
          mode: mini
          datafile_size: 20G
          log_disk_size: 10G
          init_sql: 'ALTER SYSTEM ob_vector_memory_limit_percentage = 30; SET GLOBAL ob_query_timeout=100000000;'

      - name: Live integration tests
        env:
          OCEANBASE_CI: '1'
          OB_HOST: '127.0.0.1'
          OB_PORT: '2881'
          OB_USER: 'root@test'
          OB_PASSWORD: ''
          OB_DB: 'test'
          OB_COLLECTION: 'haystack_ci_smoke'
        run: |
          python -m pytest tests/test_oceanbase_integration.py -v -m oceanbase
