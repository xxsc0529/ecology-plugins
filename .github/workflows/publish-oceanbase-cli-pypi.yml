name: Publish OceanBase CLI to PyPI

on:
  push:
    tags:
      - 'release_oceanbase_cli_*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version override for the published package (leave empty to use oceanbase-cli/pyproject.toml)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Override package version
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        working-directory: oceanbase-cli
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' pyproject.toml

      - name: Show package version
        working-directory: oceanbase-cli
        run: grep '^version' pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Run tests
        run: |
          cd oceanbase-cli
          pip install -e ".[dev]"
          pytest tests/ -v

      - name: Build package
        run: |
          rm -rf dist
          mkdir -p dist
          python -m build ./oceanbase-cli -o dist

      - name: Check distributions
        run: twine check dist/*

      - name: Upload dists
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
